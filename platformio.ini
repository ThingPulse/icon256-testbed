; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[env]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino
;upload_port = /dev/cu.usbmodem01
;monitor_port = /dev/cu.usbmodem01
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes
board_upload.require_upload_port = yes
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder, time
board_build.partitions = default_ffat_8MB.csv
board_upload.flash_size = 8MB
;board_build.partitions = src/default_ffat_8MB.csv
build_src_filter = +<*.h> +<main-${PIOENV}.cpp>
lib_deps = 

; https://github.com/espressif/arduino-esp32/issues/6762
;upload_flags =
;    --before=usb_reset
;    --after=no_reset
;    --chip=esp32s3


[env:rgb-led]
; Required to flash the board when USB-MSC is enabled
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes
board_upload.require_upload_port = yes

build_flags = -DCORE_DEBUG_LEVEL=1 
              -DARDUINO_USB_CDC_ON_BOOT=1
              -DARDUINO_USB_MODE=1

lib_deps = fastled/FastLED@3.10.3

