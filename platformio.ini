board_upload.wait_for_upload_port = yes
board_upload.require_upload_port = yes

build_flags = -D CORE_DEBUG_LEVEL=1
              -D ARDUINO_USB_CDC_ON_BOOT=1
              -D ARDUINO_USB_MODE=1
              -D BOARD_HAS_PSRAM
lib_ldf_mode = deep

lib_deps = 
    https://github.com/schreibfaul1/ESP32-audioI2S

